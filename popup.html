<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tataycs notches</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header with icon and title -->
    <div class="header">
      <span class="header-icon">&#128221;</span>
      <h1>tataycs notches</h1>
    </div>

    <!-- Tab bar: shows tabs + add button -->
    <div class="tab-bar">
      <div id="tabs-container" class="tabs-container"></div>
      <button id="add-tab-btn" class="add-tab-btn" title="Add new tab">+</button>
    </div>

    <!-- Textarea for writing notes -->
    <textarea id="notepad" placeholder="Start typing your notes..."></textarea>

    <!-- Footer: character count + clear button -->
    <div class="footer">
      <span id="char-count" class="char-count">0 characters</span>
      <button id="clear-btn">Clear Notes</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
